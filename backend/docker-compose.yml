services:
  backend:
    build: ./backend
    container_name: qivo_backend
    restart: unless-stopped
    env_file:
      - ./.env     
    ports:
      - "5000:5000"
    depends_on:
      - app_postgres
      - redis

  app_postgres:
    image: postgis/postgis:15-3.4
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qivo_admin
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: qivo_global
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: qivo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: qivo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@qivo.com
      PGADMIN_DEFAULT_PASSWORD: SuperSecurePGAdmin123!
    ports:
      - "8080:80"
    depends_on:
      - app_postgres

volumes:
  postgres_data:
  redis_data: