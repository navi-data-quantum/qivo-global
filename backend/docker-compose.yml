services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: qivo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qivo_admin
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: qivo_global
    ports:
      - "5432:5432"
    volumes:
      - qivo_postgres_data:/var/lib/postgresql/data
    networks:
      - qivo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qivo_admin -d qivo_global"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qivo_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    command: node server.js
    volumes:
      - .:/app
    networks:
      - qivo_network

networks:
  qivo_network:
    driver: bridge

volumes:
  qivo_postgres_data:







