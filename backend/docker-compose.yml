services:
  backend:
    build: .
    container_name: qivo_backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5001:5000"
    depends_on:
      - app_postgres
      - redis
    command: node server.js

  app_postgres:
    image: postgis/postgis:15-3.4
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qivo_admin
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: qivo_global
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qivo_admin -d qivo_global"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: qivo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: qivo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@qivo.com
      PGADMIN_DEFAULT_PASSWORD: SuperSecurePGAdmin123!
    ports:
      - "8080:80"
    depends_on:
      - app_postgres

volumes:
  postgres_data:
  redis_data: